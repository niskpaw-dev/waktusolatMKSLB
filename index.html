<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Waktu Solat MKSLB Premium</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#053b29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-premium: #d4af37;
            --gold-light: #f3e5ab;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dynamic-bg-center: #053b29;
            --dynamic-bg-edge: #02120c;
            --text-main: #ffffff;
            --glass-bg: rgba(2, 18, 12, 0.55);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top center, var(--dynamic-bg-center) 0%, var(--dynamic-bg-edge) 100%);
            transition: background 2s ease-in-out; 
            min-height: 100vh;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        #particles-js { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* --- MOBILE FIRST UI --- */
        .app-header {
            position: fixed;
            top: 0; width: 100%;
            padding: env(safe-area-inset-top, 15px) 20px 15px;
            background: rgba(2, 18, 12, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            text-align: center;
            box-sizing: border-box;
        }

        .app-header .bism {
            font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--gold-premium);
            text-shadow: 0 2px 10px rgba(212,175,55,0.3); margin: 0; line-height: 1;
        }

        .main-content {
            position: relative;
            z-index: 1;
            padding: 90px 20px 120px 20px; /* Ruang untuk Header & Sticky Bottom */
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(212,175,55,0.03);
            position: relative;
            overflow: hidden;
        }

        /* Watermark Logo */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: url('https://arleta.site/interactivelink/1610/LOGO-MKSLB.png') no-repeat center center;
            background-size: contain; opacity: 0.15; pointer-events: none; z-index: 0;
        }

        .content-relative { position: relative; z-index: 1; }

        h1 {
            font-size: 1.1rem; font-weight: 700; color: var(--text-main);
            letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 15px 0;
        }

        .info {
            font-size: 0.85rem; color: var(--gold-light); font-weight: 500;
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px;
            border: 1px solid rgba(212,175,55,0.1); line-height: 1.6;
        }
        .info span { color: #fff; font-weight: 400; }
        .info .highlight { color: var(--gold-premium); font-weight: 600; display: block; margin-top: 5px;}

        /* Countdown Area */
        .cd-wrapper { margin: 10px 0; }
        .cd-w-label { color: var(--gold-light); font-weight: 600; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }
        .cd-w-title { font-size: 1.5rem; color: #fff; letter-spacing: 2px; font-weight: 700; margin-top: 5px; display: block; }
        .cd-t {
            font-family: 'Montserrat', sans-serif; font-size: 3.5rem; font-weight: 700;
            color: var(--gold-premium); text-shadow: 0 0 20px rgba(212,175,55,0.6); 
            display: block; margin-top: 5px; letter-spacing: 1px;
        }

        /* Grid Waktu */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .item { 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.15); 
            border-radius: 14px; padding: 12px; transition: all 0.3s ease; text-align: center;
        }
        .item.a { 
            background: rgba(212,175,55,0.15); border-color: var(--gold-premium); 
            transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow), inset 0 0 10px rgba(212,175,55,0.1); 
        }
        .item .n { font-family: 'Amiri', serif; color: var(--gold-light); display: block; margin-bottom: 2px; font-size: 1.1rem; }
        .item .t { font-weight: 700; font-size: 1.2rem; color: #fff; }
        .item.a .n, .item.a .t { color: var(--gold-premium); text-shadow: 0 0 10px rgba(212,175,55,0.4); }

        /* Ticker */
        .ticker-wrap {
            overflow: hidden; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212,175,55,0.2); border-radius: 10px;
            padding: 10px 0; white-space: nowrap; width: 100%; box-sizing: border-box;
        }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll-left 40s linear infinite; }
        .ticker-item { padding-right: 3rem; color: var(--gold-light); font-size: 0.85rem; font-weight: 500; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* Sticky Bottom Action */
        .action-bottom {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(2, 18, 12, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            padding: 15px 20px env(safe-area-inset-bottom, 15px);
            box-sizing: border-box; z-index: 100;
        }

        .btn-wa {
            background: linear-gradient(135deg, #128C7E, #25D366); color: #fff;
            font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 1px;
            border: none; border-radius: 14px; padding: 15px; width: 100%; max-width: 600px; margin: 0 auto;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.25);
        }
        .btn-wa:active { transform: scale(0.98); }

        @media(min-width:600px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .app-header, .action-bottom { display: flex; justify-content: center; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="app-header">
    <div class="bism">Waktu Solat</div>
</div>

<div class="main-content">
    
    <div class="glass-card">
        <div class="watermark"></div>
        <div class="content-relative">
            <h1>Masjid Kg Sungai Lang Baru</h1>
            <div class="info">
                TARIKH: <span id="dt">MEMUATKAN...</span><br>
                HIJRIAH: <span id="dt-hijri">MEMUATKAN...</span>
                <span class="highlight">Zon SGR03 • Kuala Langat</span>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="content-relative cd-wrapper">
            <span class="cd-w-label">Menuju</span>
            <span id="cd-w" class="cd-w-title">MEMUATKAN DATA...</span>
            <span id="cd-t" class="cd-t">--:--:--</span>
        </div>
    </div>

    <div class="grid" id="gr"></div>

    <div class="ticker-wrap">
        <div class="ticker">
            <span class="ticker-item">Selamat Datang ke Web App Rasmi Waktu Solat Masjid Kampung Sungai Lang Baru ⭐ Jom Infaq : Bank Islam | 1207 4010 0317 14 • Masjid Kampung Sungai Lang Baru ⭐</span>
        </div>
    </div>
</div>

<div class="action-bottom">
    <button class="btn-wa" onclick="kongsiWhatsApp()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c-.003 1.396.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
        </svg>
        Kongsi Jadual Hari Ini
    </button>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
// --- LOGIK SOLAT & UI KEKAL SAMA SEPERTI ASAL ---
const L = ['Imsak', 'Subuh', 'Syuruk', 'Dhuha', 'Zohor', 'Asar', 'Maghrib', 'Isyak'];
const I = x => document.getElementById(x);
let D = [], T;

try {
    I('dt').innerHTML = new Date().toLocaleDateString('ms-MY', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
} catch(e) { console.error("Ralat Tarikh", e); }

fetch('https://api.waktusolat.app/v2/solat/SGR03')
    .then(r => r.json())
    .then(d => {
        let today = d.prayers.find(p => p.day === new Date().getDate()) || d.prayers[0];
        
        let subuh = new Date(today.fajr * 1000);
        let imsak = new Date(subuh.getTime() - (10 * 60000));
        let syuruk = new Date(today.syuruk * 1000);
        let dhuha = new Date(syuruk.getTime() + (28 * 60000));
        let zohor = new Date(today.dhuhr * 1000);
        let asar = new Date(today.asr * 1000);
        let maghrib = new Date(today.maghrib * 1000);
        let isyak = new Date(today.isha * 1000);
        
        D = [imsak, subuh, syuruk, dhuha, zohor, asar, maghrib, isyak];
        
        upd();
        kemaskiniTarikhHijrah();
    })
    .catch(e => { 
        I('cd-w').innerText = "RALAT PANGKALAN DATA"; 
        console.error("API Error", e); 
    });

function kemaskiniTarikhHijrah() {
    let dateObj = new Date();
    let tarikhHijri = "";
    try {
        let offsetHari = -1;
        if (D[6] && dateObj.getTime() >= D[6].getTime()) { offsetHari = 0; }
        
        let dateHijri = new Date(dateObj.getTime() + (offsetHari * 24 * 60 * 60 * 1000));
        let hijriFormatter = new Intl.DateTimeFormat('en-US-u-ca-islamic', { day: 'numeric', month: 'numeric', year: 'numeric' });
        let parts = hijriFormatter.format(dateHijri).split(' ')[0].split('/'); 
        let bulanHijrah = ['Muharram','Safar','Rabiulawal','Rabiulakhir','Jamadilawal','Jamadilakhir','Rejab','Syaaban','Ramadan','Syawal','Zulkaedah','Zulhijjah'];
        tarikhHijri = `${parts[1]} ${bulanHijrah[parseInt(parts[0])-1]} ${parts[2]}H`;
    } catch(e) { 
        tarikhHijri = "TIDAK TERSEDIA"; 
    }
    I('dt-hijri').innerText = tarikhHijri.toUpperCase();
}

function kemaskiniLatarBelakang() {
    if(D.length === 0) return;
    let sekarang = new Date().getTime();
    let subuh = D[1].getTime(); let syuruk = D[2].getTime();
    let asar = D[5].getTime(); let maghrib = D[6].getTime();
    let root = document.documentElement;
    
    if (sekarang >= subuh && sekarang < syuruk) {
        root.style.setProperty('--dynamic-bg-center', '#0a5c44'); root.style.setProperty('--dynamic-bg-edge', '#021a11');
    } else if (sekarang >= syuruk && sekarang < asar) {
        root.style.setProperty('--dynamic-bg-center', '#107c5b'); root.style.setProperty('--dynamic-bg-edge', '#052b1e');
    } else if (sekarang >= asar && sekarang < maghrib) {
        root.style.setProperty('--dynamic-bg-center', '#146141'); root.style.setProperty('--dynamic-bg-edge', '#071c12');
    } else {
        root.style.setProperty('--dynamic-bg-center', '#053b29'); root.style.setProperty('--dynamic-bg-edge', '#02120c');
    }
}

function upd(){
    let N=new Date(), nG=-1, nC=D.findIndex(x=>x>N);
    I('gr').innerHTML = D.map((d,i)=>{
        if(nG===-1 && d>N) nG=i; 
        return `<div class="item ${i===nG?'a':''}"><span class="n">${L[i]}</span><span class="t">${d.toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit',hour12:false})}</span></div>`;
    }).join('');
    
    if(nC>-1){ 
        I('cd-w').innerText=L[nC].toUpperCase(); cd(D[nC]); 
    } else { 
        I('cd-w').innerText="MENANTI IMSAK ESOK"; I('cd-t').innerText="00:00:00"; 
    }
    kemaskiniLatarBelakang();
}

function cd(tgt){
    if(T) clearInterval(T);
    T = setInterval(()=>{
        let df = Math.floor((tgt-new Date())/1000);
        if(df<=0) return location.reload(); 
        let f=x=>String(Math.max(0,x)).padStart(2,'0');
        I('cd-t').innerText = `${f(Math.floor(df/3600))}:${f(Math.floor((df%3600)/60))}:${f(df%60)}`;
    }, 1000);
}

function kongsiWhatsApp() {
    if(D.length === 0) return alert("Sila tunggu data dimuatkan sepenuhnya...");
    let tarikhMasihi = I('dt').innerText; let tarikhHijri = I('dt-hijri').innerText; 
    let fm = (dt) => dt.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: true});
    
    let mesej = `⏰ *Jadual Waktu Solat* ⏰\n📍 Masjid Kampung Sungai Lang Baru (Zon SGR03)\n🗓️ ${tarikhMasihi}\n🌟 ${tarikhHijri}\n\n\`\`\`\n`;
    mesej += `🌥️  Imsak    : ${fm(D[0])}\n⛅  Subuh    : ${fm(D[1])}\n🌤️  Syuruk   : ${fm(D[2])}\n☀️  Dhuha    : ${fm(D[3])}\n`;
    mesej += `🌞  Zohor    : ${fm(D[4])}\n☀️  Asar     : ${fm(D[5])}\n🌙  Maghrib  : ${fm(D[6])}\n⭐  Isyak    : ${fm(D[7])}\n\`\`\`\n\n`;
    mesej += `🌐 Semak waktu rasmi:\n${window.location.href}`;
    
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mesej)}`, '_blank');
}

window.onload = function() {
    if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {
            particles: {
                number: { value: 30, density: { enable: true, value_area: 800 } },
                color: { value: "#d4af37" }, 
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.1, sync: false } },
                size: { value: 2.5, random: true },
                line_linked: { enable: false }, 
                move: { enable: true, speed: 0.8, direction: "top", random: true, out_mode: "out" }
            },
            interactivity: { detect_on: "canvas", events: { resize: true } },
            retina_detect: true
        });
    }
};

// --- PENDAFTARAN SERVICE WORKER UNTUK PWA ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('PWA Service Worker Aktif!', reg.scope))
            .catch(err => console.error('Pendaftaran SW Gagal:', err));
    });
}
</script>
</body>
</html>
